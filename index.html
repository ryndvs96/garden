<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Planner</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Garden Planner</h1>

    <div class="tabs">
        <button class="tab active" data-year="2026">2026</button>
        <button class="tab" data-year="2025">2025</button>
    </div>

    <div class="sub-tabs" id="subTabs">
        <button class="sub-tab active" data-view="seeds">Seeds</button>
        <button class="sub-tab" data-view="beds">Beds</button>
    </div>

    <div id="seedsView">
        <div class="filters">
        <label>
            Search:
            <input type="text" id="search" placeholder="Search plants...">
        </label>
        <label>
            Category:
            <select id="plantType">
                <option value="">All Categories</option>
            </select>
        </label>
        <label>
            <input type="checkbox" id="allocatedOnly">
            Allocated only
        </label>
    </div>

    <div class="stats" id="stats"></div>

    <table>
        <thead id="tableHead">
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
    </div>

    <div id="bedsView" class="hidden">
        <div class="bed-controls">
            <div class="timeline-container">
                <div class="timeline-header">
                    <span class="timeline-current" id="timelineCurrent">1/24</span>
                    <span class="timeline-hint">Click a date or drag along the timeline</span>
                </div>
                <div class="timeline" id="timeline"></div>
            </div>
            <div class="sow-info" id="sowInfo"></div>
        </div>
        <div class="garden-layout" id="gardenLayout"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
