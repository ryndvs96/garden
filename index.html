<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Planner</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Garden Planner</h1>

    <div class="tabs">
        <button class="tab active" data-year="2026">2026</button>
        <button class="tab" data-year="2025">2025</button>
    </div>

    <div class="filters">
        <label>
            Search:
            <input type="text" id="search" placeholder="Search plants...">
        </label>
        <label>
            Plant Type:
            <select id="plantType">
                <option value="">All Types</option>
            </select>
        </label>
        <label>
            <input type="checkbox" id="allocatedOnly" checked>
            Allocated only
        </label>
    </div>

    <div class="stats" id="stats"></div>

    <table>
        <thead id="tableHead">
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
